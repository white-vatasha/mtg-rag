apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: mtg-rag
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: init-rag-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /vol/context /vol/mtg_db /vol/scraped_decks /vol/data
          volumeMounts:
            - name: rag-data
              mountPath: /vol
        - name: wait-ollama
          image: curlimages/curl:8.12.1
          command:
            - sh
            - -c
            - |
              until curl -sf http://ollama:11434/; do
                echo "waiting for ollama..."
                sleep 5
              done
      containers:
        - name: api
          image: mtg-rag-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mtg-rag-config
            - secretRef:
                name: mtg-rag-secret
          volumeMounts:
            - name: rag-data
              mountPath: /data
              subPath: data
            - name: rag-data
              mountPath: /app/context
              subPath: context
            - name: rag-data
              mountPath: /app/ingestion/mtg_db
              subPath: mtg_db
            - name: rag-data
              mountPath: /app/ingestion/scraped_decks
              subPath: scraped_decks
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          startupProbe:
            httpGet:
              path: /api/health
              port: 8000
            failureThreshold: 360
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 30
      volumes:
        - name: rag-data
          persistentVolumeClaim:
            claimName: rag-data
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: mtg-rag
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
