apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mtg-rag
  namespace: mtg-rag
spec:
  ingressClassName: nginx
  rules:
    - host: mtg-rag.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
