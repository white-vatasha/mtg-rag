# Datadog Agent DaemonSet — collect logs, APM traces, and DogStatsD from mtg-rag pods.
# Requires datadog-secret (see datadog-secret.example.yaml).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: datadog-agent
  namespace: mtg-rag
  labels:
    app: datadog-agent
spec:
  selector:
    matchLabels:
      app: datadog-agent
  template:
    metadata:
      labels:
        app: datadog-agent
    spec:
      serviceAccountName: datadog-agent
      containers:
        - name: agent
          image: gcr.io/datadoghq/agent:7
          env:
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: datadog-secret
                  key: api-key
            - name: DD_SITE
              valueFrom:
                secretKeyRef:
                  name: datadog-secret
                  key: site
                  optional: true
            - name: DD_CLUSTER_NAME
              value: "mtg-rag-minikube"
            - name: DD_ENV
              valueFrom:
                configMapKeyRef:
                  name: mtg-rag-config
                  key: DD_ENV
                  optional: true
            - name: DD_TAGS
              value: "env:minikube cluster:mtg-rag-minikube"
            - name: DD_APM_ENABLED
              value: "true"
            - name: DD_LOGS_ENABLED
              value: "true"
            - name: DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL
              value: "true"
            - name: DD_PROCESS_AGENT_ENABLED
              value: "true"
            - name: DD_DOGSTATSD_NON_LOCAL_TRAFFIC
              value: "true"
            # Kubernetes / container infra (Infrastructure list, Orchestrator)
            - name: DD_COLLECT_KUBERNETES_EVENTS
              value: "true"
            - name: DD_LEADER_ELECTION
              value: "true"
            - name: DD_KUBERNETES_COLLECT_METADATA
              value: "true"
            - name: DD_KUBELET_TLS_VERIFY
              value: "false"
            - name: DD_KUBERNETES_KUBELET_NODENAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DD_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            # Expose APM + DogStatsD on the node IP (API uses status.hostIP as DD_AGENT_HOST)
            - containerPort: 8126
              hostPort: 8126
              name: traceport
            - containerPort: 8125
              hostPort: 8125
              protocol: UDP
              name: dogstatsd
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: dockersocket
              mountPath: /var/run/docker.sock
              readOnly: true
            - name: procdir
              mountPath: /host/proc
              readOnly: true
            - name: cgroups
              mountPath: /host/sys/fs/cgroup
              readOnly: true
            - name: passwd
              mountPath: /etc/passwd
              readOnly: true
      volumes:
        - name: dockersocket
          hostPath:
            path: /var/run/docker.sock
        - name: procdir
          hostPath:
            path: /proc
        - name: cgroups
          hostPath:
            path: /sys/fs/cgroup
        - name: passwd
          hostPath:
            path: /etc/passwd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: datadog-agent
  namespace: mtg-rag
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: datadog-agent-mtg-rag
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - nodes/spec
      - nodes/stats
      - nodes/proxy
      - pods
      - services
      - events
      - endpoints
      - namespaces
      - configmaps
      - persistentvolumeclaims
      - persistentvolumes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["quota.openshift.io"]
    resources: ["clusterresourcequotas"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: datadog-agent-mtg-rag
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: datadog-agent-mtg-rag
subjects:
  - kind: ServiceAccount
    name: datadog-agent
    namespace: mtg-rag
